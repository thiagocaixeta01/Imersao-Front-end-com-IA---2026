<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para começar a assistir conteúdo personalizado na Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        
        <section class="profiles">
            <article class="profile">
                <figure>
                    <img src="./assets/perfil-1.jpg" alt="Um homem faz uma careta engraçada enquanto segura um par de óculos grandes bem próximo à câmera.">
                    <figcaption>Pedro</figcaption>
                </figure>
            </article>
            
            <article class="profile">
                <figure>
                    <img src="./assets/perfil-2.jpg" alt="Uma jovem sorri para a câmera exibindo um penteado único com uma mecha de cabelo apontando para cima.">
                    <figcaption>Gustavo</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <img src="./assets/perfil-3.jpg" alt="Um chimpanzé aparece usando óculos de grau e lábios vermelhos maquiados em uma pose cômica.">
                    <figcaption>Mariana</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <img src="./assets/perfil-4.jpg" alt="Um homem sorridente usa um capacete rosa com antenas, assemelhando-se a um personagem de inseto.">
                    <figcaption>Lucas</figcaption>
                </figure>
            </article>
        </section>
    </main>
</body>
</html>
