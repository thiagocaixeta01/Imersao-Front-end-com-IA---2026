<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para começar a assistir conteúdo personalizado na Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Tela de Carregamento Fullscreen -->
    <div id="loading-screen" class="loading-screen">
        <video id="loading-video" autoplay muted class="loading-video">
            <source src="./assets/Netflix-Logo-Animation.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>

    <main style="display: none;">
        <nav class="navbar">
            <div class="logo">NETFLIX</div>
            <button id="theme-toggle" aria-label="Alternar tema">&#x1F319;</button>
        </nav>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section aria-label="Perfis disponíveis para seleção">
            <nav class="profiles">
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="./assets/perfil-1.jpg"
                            alt="Um homem faz uma careta engraçada enquanto segura um par de óculos grandes bem próximo à câmera.">
                    </figure>
                    <figcaption>Pedro</figcaption>
                </a>

                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="./assets/perfil-2.jpg"
                            alt="Uma jovem sorri para a câmera exibindo um penteado único com uma mecha de cabelo apontando para cima.">
                    </figure>
                    <figcaption>Gustavo</figcaption>
                </a>

                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="./assets/perfil-3.jpg"
                            alt="Um chimpanzé aparece usando óculos de grau e lábios vermelhos maquiados em uma pose cômica.">
                    </figure>
                    <figcaption>Mariana</figcaption>
                </a>

                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="./assets/perfil-4.jpg"
                            alt="Um homem sorridente usa um capacete rosa com antenas, assemelhando-se a um personagem de inseto.">
                    </figure>
                    <figcaption>Lucas</figcaption>
                </a>
            </nav>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
